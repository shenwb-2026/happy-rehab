<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=1376, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1a0050" />
  <meta name="description" content="快乐康复指导 — 基于 MediaPipe 的行走训练 PWA" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />
  <title>快乐康复指导</title>
</head>
<body>
  <div id="app">
    <!-- 游戏画布 -->
    <canvas id="main-canvas"></canvas>

    <!-- DOM UI 层（叠加在 Canvas 上方） -->
    <div id="ui-layer">

      <!-- 校准界面 -->
      <div id="screen-calibration" class="screen">
        <div id="calibration-video-container"></div>

        <div id="confidence-bar">
          <div class="conf-item">
            <div class="conf-dot" id="conf-left-hip"></div>
            <span class="conf-label">左髋</span>
          </div>
          <div class="conf-item">
            <div class="conf-dot" id="conf-right-hip"></div>
            <span class="conf-label">右髋</span>
          </div>
          <div class="conf-item">
            <div class="conf-dot" id="conf-left-knee"></div>
            <span class="conf-label">左膝</span>
          </div>
          <div class="conf-item">
            <div class="conf-dot" id="conf-right-knee"></div>
            <span class="conf-label">右膝</span>
          </div>
        </div>

        <div id="calibration-countdown" class="hidden">5</div>
        <div id="calibration-status"></div>

        <div id="calib-action-row">
          <button id="btn-start-calibration" class="btn btn-primary btn-lg">开始校准</button>
          <button id="btn-start-training"    class="btn btn-success  btn-lg hidden">开始训练</button>
        </div>
      </div>

      <!-- 游戏选择界面 -->
      <div id="screen-game-select" class="screen hidden">
        <div id="game-select-title">选择今天的游戏 🎮</div>
        <div id="game-cards">
          <div class="game-card" data-game="bubble">
            <canvas id="preview-bubble" width="280" height="175"></canvas>
            <div class="game-title">泡泡消除</div>
            <div class="game-desc">行走→破泡泡，感官即时反馈</div>
            <button id="btn-select-bubble" class="btn btn-primary">选择</button>
          </div>
          <div class="game-card" data-game="companion">
            <canvas id="preview-companion" width="280" height="175"></canvas>
            <div class="game-title">陪伴之旅</div>
            <div class="game-desc">和小伙伴一起散步冒险</div>
            <button id="btn-select-companion" class="btn btn-success">选择</button>
          </div>
        </div>
      </div>

      <!-- 训练界面（HUD 叠加层） -->
      <div id="screen-training" class="screen hidden">
        <div id="hud-top-row">
          <div id="hud-timer">00:00</div>
        </div>

        <div id="warning-banner" class="hidden"></div>

        <!-- 休息按钮（右下角） -->
        <button id="btn-rest" title="休息">💤</button>

        <!-- 结束训练按钮（左下角） -->
        <button id="btn-end" title="结束训练">结束训练</button>
      </div>

      <!-- 休息界面 -->
      <div id="screen-rest" class="screen hidden">
        <div id="rest-label">💤 休息一下</div>
        <button id="btn-continue">继续！</button>
      </div>

      <!-- 训练总结界面 -->
      <div id="screen-summary" class="screen hidden">
        <div id="summary-title">🎉 训练完成！</div>
        <div id="summary-stats">
          <div class="stat-card">
            <div class="stat-icon">👣</div>
            <div class="stat-value" id="summary-total-steps">0</div>
            <div class="stat-label">总步数</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">⏱️</div>
            <div class="stat-value" id="summary-duration">0分0秒</div>
            <div class="stat-label">训练时长</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">🔥</div>
            <div class="stat-value" id="summary-max-streak">0</div>
            <div class="stat-label">最高连续步数</div>
          </div>
        </div>
        <div id="summary-btns">
          <button id="btn-again" class="btn btn-success btn-lg">再来一次</button>
          <button id="btn-home"  class="btn btn-primary btn-lg">返回首页</button>
        </div>
      </div>

    </div><!-- /ui-layer -->
  </div><!-- /app -->

  <script type="module" src="/src/main.js"></script>
</body>
</html>
